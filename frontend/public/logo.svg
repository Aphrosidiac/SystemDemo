<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" role="img" aria-label="SystemDemo">
  <defs>
    <linearGradient id="sd-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Mark: rounded square with SD glyph -->
  <rect x="2" y="6" width="44" height="44" rx="12" fill="url(#sd-mark)"/>
  <text x="24" y="36" text-anchor="middle"
        font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif"
        font-size="20" font-weight="800" fill="#ffffff" letter-spacing="-0.5">SD</text>
  <!-- Wordmark -->
  <text x="58" y="32"
        font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif"
        font-size="22" font-weight="800" fill="#1c1917" letter-spacing="-0.4">System<tspan fill="#4f46e5">Demo</tspan></text>
  <!-- DEMO badge -->
  <rect x="58" y="38" width="44" height="14" rx="7" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
  <text x="80" y="48" text-anchor="middle"
        font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif"
        font-size="9" font-weight="800" fill="#92400e" letter-spacing="2">DEMO</text>
</svg>
